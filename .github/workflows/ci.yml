name: CI/CD

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # CI — build / validación
  # ----------------------------------------------------------------
  java:
    name: Build Java · ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, reservation, waiting-room]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build (mvn package)
        run: mvn -B -ntp -f services/${{ matrix.service }}/pom.xml package

  node-auth:
    name: Build Node · auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
        working-directory: services/auth
      - name: Syntax check
        run: node --check server.js
        working-directory: services/auth

  web-ui:
    name: Build · web-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
        working-directory: web-ui
      - run: npm run build
        working-directory: web-ui

  config:
    name: Validate gateway & compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate KrakenD config
        run: |
          docker run --rm -v "${{ github.workspace }}/gateway:/etc/krakend" \
            devopsfaith/krakend:2.6 check -c /etc/krakend/krakend.json --lint
      - name: Validate docker-compose
        run: |
          cp .env.example .env
          docker compose config -q

  # ----------------------------------------------------------------
  # CI — smoke test de salud (depende de los builds)
  # ----------------------------------------------------------------
  smoke:
    name: Health smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [java, node-auth, web-ui, config]
    steps:
      - uses: actions/checkout@v4

      - name: Preparar .env
        run: cp .env.example .env

      - name: Levantar el núcleo de la app (sin observabilidad)
        # Solo gateway + sus dependencias (auth, catalog, reservation, waiting-room,
        # MySQL x2, Redis, Kafka, Zookeeper). 1 réplica por servicio para ahorrar recursos.
        run: |
          docker compose up -d --build \
            --scale auth=1 --scale catalog=1 --scale reservation=1 --scale waiting-room=1 \
            gateway

      - name: Esperar readiness y chequear salud (vía gateway)
        run: |
          ready=0
          for i in $(seq 1 60); do
            TOKEN=$(curl -s -X POST http://localhost:8080/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"admin@admin.com","password":"123456"}' \
              | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
            if [ -n "$TOKEN" ]; then
              e=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" http://localhost:8080/api/events)
              t=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" http://localhost:8080/api/tickets)
              w=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" "http://localhost:8080/api/waiting-room/status?eventId=ci&userId=ci")
              echo "intento $i: auth=200 events=$e tickets=$t waiting-room=$w"
              if [ "$e" = "200" ] && [ "$t" = "200" ] && [ "$w" = "200" ]; then ready=1; break; fi
            else
              echo "intento $i: auth/gateway aún no responden"
            fi
            sleep 5
          done
          if [ "$ready" != "1" ]; then
            echo "::error::Las APIs no quedaron saludables dentro del tiempo esperado"
            exit 1
          fi
          echo "✅ Salud OK: login + catalog + reservation + waiting-room responden 200 vía gateway"

      - name: Logs de los servicios (si falla)
        if: failure()
        run: docker compose logs --tail=100 gateway auth catalog reservation waiting-room

      - name: Limpieza
        if: always()
        run: docker compose down -v

  # ----------------------------------------------------------------
  # CD — publicar imágenes en GHCR (solo si TODO el CI pasó)
  # Se omite en PRs; corre en push a master y en tags v*.
  # ----------------------------------------------------------------
  publish:
    name: Publish ${{ matrix.name }} → GHCR
    runs-on: ubuntu-latest
    needs: [java, node-auth, web-ui, config, smoke]
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: auth,         context: ./services/auth }
          - { name: catalog,      context: ./services/catalog }
          - { name: reservation,  context: ./services/reservation }
          - { name: waiting-room, context: ./services/waiting-room }
          - { name: web-ui,       context: ./web-ui }
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata / tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lc }}/event-pass-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
