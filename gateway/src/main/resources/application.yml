server:
  port: 8080

spring:
  application:
    name: eventpass-gateway
  cloud:
    gateway:
      routes:
        - id: catalog
          uri: ${CATALOG_URL:http://catalog:8082}
          predicates:
            - Path=/api/events/**
          filters:
            - name: JwtAuth
              args:
                excludedPaths: /api/auth/login

        - id: waiting-room
          uri: ${WAITING_ROOM_URL:http://waiting-room:8081}
          predicates:
            - Path=/api/waiting-room/**
          filters:
            - name: JwtAuth
              args:
                excludedPaths: /api/auth/login

        - id: reservation
          uri: ${RESERVATION_URL:http://reservation:8083}
          predicates:
            - Path=/api/tickets/**
          filters:
            - name: JwtAuth
              args:
                excludedPaths: /api/auth/login

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
