server:
  port: 8081

spring:
  application:
    name: eventpass-waiting-room
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:redispass}
      timeout: 2000ms

springdoc:
  swagger-ui:
    path: /docs
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
