networks:
  event-pass-net:
    driver: bridge

volumes:
  mysql-catalog-data:
  mysql-reservation-data:
  redis-data:
  prometheus-data:
  grafana-data:
  zookeeper-data:
  kafka-data:

services:
  # ============================================
  # INFRAESTRUCTURA BASE
  # ============================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: eventpass-zookeeper
    networks: [event-pass-net]
    volumes: [zookeeper-data:/var/lib/zookeeper/data]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: eventpass-kafka
    networks: [event-pass-net]
    volumes: [kafka-data:/var/lib/kafka/data]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eventpass-redis
    networks: [event-pass-net]
    volumes: [redis-data:/data]
    ports: ["6379:6379"]
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-catalog:
    image: mysql:8.0
    container_name: eventpass-mysql-catalog
    networks: [event-pass-net]
    volumes: [mysql-catalog-data:/var/lib/mysql]
    ports: ["3307:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ${MYSQL_CATALOG_DATABASE}
      MYSQL_USER: ${MYSQL_CATALOG_USER}
      MYSQL_PASSWORD: ${MYSQL_CATALOG_PASSWORD}
    healthcheck:
      test: ["CMD", "mysql", "-u${MYSQL_CATALOG_USER}", "-p${MYSQL_CATALOG_PASSWORD}", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql-reservation:
    image: mysql:8.0
    container_name: eventpass-mysql-reservation
    networks: [event-pass-net]
    volumes: [mysql-reservation-data:/var/lib/mysql]
    ports: ["3308:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ${MYSQL_RESERVATION_DATABASE}
      MYSQL_USER: ${MYSQL_RESERVATION_USER}
      MYSQL_PASSWORD: ${MYSQL_RESERVATION_PASSWORD}
    healthcheck:
      test: ["CMD", "mysql", "-u${MYSQL_RESERVATION_USER}", "-p${MYSQL_RESERVATION_PASSWORD}", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================
  # OBSERVABILIDAD
  # ============================================

  prometheus:
    image: prom/prometheus:latest
    container_name: eventpass-prometheus
    networks: [event-pass-net]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports: ["9090:9090"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - gateway
      - waiting-room
      - catalog
      - reservation

  grafana:
    image: grafana/grafana:latest
    container_name: eventpass-grafana
    networks: [event-pass-net]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

  # ============================================
  # MICROSERVICIOS
  # ============================================

  gateway:
    image: devopsfaith/krakend:2.6
    container_name: eventpass-gateway
    restart: on-failure
    networks: [event-pass-net]
    ports: ["${GATEWAY_PORT}:8080"]
    volumes:
      - ./gateway/krakend.json:/etc/krakend/krakend.json:ro
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    depends_on:
      - auth
      - waiting-room
      - catalog
      - reservation

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: eventpass-auth
    restart: on-failure
    networks: [event-pass-net]
    ports: ["8084:8084"]
    environment:
      PORT: 8084
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}

  waiting-room:
    build:
      context: ./services/waiting-room
      dockerfile: Dockerfile
    container_name: eventpass-waiting-room
    restart: on-failure
    networks: [event-pass-net]
    ports: ["8081:8081"]
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      redis:
        condition: service_healthy

  catalog:
    build:
      context: ./services/catalog
      dockerfile: Dockerfile
    container_name: eventpass-catalog
    restart: on-failure
    networks: [event-pass-net]
    ports: ["8082:8082"]
    environment:
      MYSQL_HOST: mysql-catalog
      MYSQL_DATABASE: ${MYSQL_CATALOG_DATABASE}
      MYSQL_USER: ${MYSQL_CATALOG_USER}
      MYSQL_PASSWORD: ${MYSQL_CATALOG_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      mysql-catalog:
        condition: service_healthy
      redis:
        condition: service_healthy

  reservation:
    build:
      context: ./services/reservation
      dockerfile: Dockerfile
    container_name: eventpass-reservation
    restart: on-failure
    networks: [event-pass-net]
    ports: ["8083:8083"]
    environment:
      MYSQL_HOST: mysql-reservation
      MYSQL_DATABASE: ${MYSQL_RESERVATION_DATABASE}
      MYSQL_USER: ${MYSQL_RESERVATION_USER}
      MYSQL_PASSWORD: ${MYSQL_RESERVATION_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql-reservation:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ============================================
  # WEB UI
  # ============================================

  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: eventpass-web-ui
    networks: [event-pass-net]
    ports: ["3000:3000"]
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - gateway

