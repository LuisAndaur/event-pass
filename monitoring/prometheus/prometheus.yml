global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:9091"]

  # The API services are scaled horizontally; DNS service discovery resolves
  # the Compose service name to every replica's IP so all of them are scraped.
  - job_name: "waiting-room"
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names: ["waiting-room"]
        type: A
        port: 8081
        refresh_interval: 15s

  - job_name: "catalog"
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names: ["catalog"]
        type: A
        port: 8082
        refresh_interval: 15s

  - job_name: "reservation"
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names: ["reservation"]
        type: A
        port: 8083
        refresh_interval: 15s
